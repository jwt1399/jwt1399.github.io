<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>Snake-Game | 简简</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
	*{margin: 0;padding: 0;}
	body{background-color: #0f606d;}
	#wall{
		background-color: #444;
		width: 600px;
		height:500px;
		margin: 50px auto;
		-webkit-box-shadow:0 0 10px #444;  
  		-moz-box-shadow:0 0 10px #444;  
  		box-shadow:0 0 10px #444; 
  		position: relative;
	}
	#gridCanvas{
		height: 100%;
		width:100%;
		background: -webkit-linear-gradient(top,transparent 19px, #fff 20px),
		            -webkit-linear-gradient(left,transparent 19px, #fff 20px);
		background: -o-linear-gradient(top,transparent 19px, #fff 20px),
		            -o-linear-gradient(left,transparent 19px, #fff 20px);
		background: -moz-linear-gradient(top,transparent 19px, #fff 20px),
		            -moz-linear-gradient(left,transparent 19px, #fff 20px);
		background: linear-gradient(top,transparent 19px, #fff 20px),
		            linear-gradient(left,transparent 19px, #fff 20px);
		background-size: 20px 20px;
		background-repeat: repeat;
	}
	#forScore{
		display: block;
		width: 45px;
		height: 35px;
		line-height: 35px;
		position: absolute;
		top: 0px;
		left: 655px;
		background-color: #47374A;
		color: #fff;
		text-align: center;
		font-size: 24px;
	}
	#forScore:before{
		content: "Score";
		width:45px;
		height: 25px;
		line-height: 25px;
		position: absolute;
		top: -26px;
		left:0px;
		background-color: #47374A;
		font-size: 14px;
		border-top-left-radius: 20px;
		border-top-right-radius: 20px;

	}
	.o_span{
		display: block;
		background-color: #47374A;
		color: #fff;
		font-size: 16px;
		text-align: center;
		border-radius: 10px;
		cursor: pointer;
		font-weight: bolder;
	}
	.speedUp{
		width: 130px;
		height: 35px;
		line-height: 35px;
		position: absolute;
		top:60px;
		left: 615px;
	}
	.speedDown{
		width: 130px;
		height: 35px;
		line-height: 35px;
		position: absolute;
		top:100px;
		left: 615px;
	}
	.dirUp{
		width:60px;
		height: 35px;
		line-height: 35px;
		position: absolute;
		top:180px;
		left: 645px;
	}
	.dirRight{
		width:35px;
		height: 60px;
		line-height: 60px;
		position: absolute;
		top:220px;
		left: 690px;
	}
	.dirDown{
		width:60px;
		height: 35px;
		line-height: 35px;
		position: absolute;
		top:285px;
		left: 645px;
	}
	.dirLeft{
		width:35px;
		height: 60px;
		line-height: 60px;
		position: absolute;
		top:220px;
		left: 625px;
	}
	.warning_span{
		position: absolute;
		top:-30px;
		left: 115px;
		color: #fff;
	}
	.reset_span{
		width: 130px;
		height: 35px;
		line-height: 35px;
		position: absolute;
		top:360px;
		left: 615px;
	}
</style>
</head>
<body>
<!-- partial:index.partial.html -->
<div id="wall">
		<canvas id="gridCanvas"></canvas>
		<span id="forScore">0</span>
		<span class="warning_span">用键盘或者点击右侧的按钮来控制方向</span>
		<span class="o_span speedUp">加速</span>
		<span class="o_span speedDown">减速</span>
		<span class="o_span dirUp">↑</span>
		<span class="o_span dirRight">→</span>
		<span class="o_span dirDown">↓</span>
		<span class="o_span dirLeft">←</span>
		<span class="o_span reset_span">Reset</span>
	</div>
<!-- partial -->
   <script src='https://code.jquery.com/jquery-2.2.4.min.js'></script>

</body>
<script>
var oh=$("#wall").height();
	var ow=$("#wall").width();
	var oscore=$("#forScore");
	var canvas = $("#gridCanvas")[0];
	var ctx = canvas.getContext("2d");

	var snake_array=[];
	var score_arr=[];
	var food;
	var nextS="right";
	var score=0;
	var cw=20;
	var cx=10;
	var cy=6;
	var speed=200;

	init();

	function init(){
		create_snake();
		create_food();
		//paint_snake();
		if(typeof game_loop != "undefined") clearInterval(game_loop);
		game_loop = setInterval(paint_snake, speed);
	}
	function create_snake(){
		var len=5; 
		for (var i = len-1; i >= 0; i--) {
			snake_array.push({x:i,y:0});
		};
	}
	function create_food(){
		food={
			x:Math.round(Math.random()*(ow-cw)/cw),
			y:Math.round(Math.random()*(oh-cw)/cw)
		}
		food_cell(food.x,food.y);
	}
	function paint_snake(){

		 var sx=snake_array[0].x;
		 var sy=snake_array[0].y;

		 if(nextS=="right") sx++;
		 else if(nextS=="left") sx--;
		 else if(nextS=="up") sy--;
		 else if(nextS=="down") sy++;

		 //吃到食物时处理；
		 if (sx==food.x && sy==food.y) {
		 	var tail={x:sx,y:sy};
		 	score++;
		 	create_food();
		 	oscore.html(score);
		 }else{
		 	//snake_array.pop();
		 	var old_tail=snake_array.pop();
		 	var tail=old_tail;
		 	clear_cell(old_tail.x,old_tail.y);
		 	tail.x=sx;
		 	tail.y=sy;
		 }
		
		 snake_array.unshift(tail);

		for (var i = 0; i < snake_array.length; i++) {
			var sa=snake_array[i];
			snake_cell(sa.x,sa.y);
		};

		//出界时的处理；
		if(sx>=30){
			snake_array[0].x=0;
		}
		else if(sx<0){
			snake_array[0].x=30;
		}
		else if(sy>=25){
			snake_array[0].y=0;
		}
		else if(sy<0){
			snake_array[0].y=25;
		}

		//自毁时的处理--Game Over；
		for (var j = 1; j < snake_array.length; j++) {
			var cell_x=snake_array[j].x;
			var cell_y=snake_array[j].y;
			if(sx==cell_x&&sy==cell_y){
				//计入得分；
				score_arr.push(score);
				var highestScore=score_arr.sort(compare);
				var score_len=highestScore.length;
				alert("GAME OVER ! ! ! !\n目前得分 (Current Score):"+score
					+"\n史上最高分(Highest Score):"+score_arr[score_len-1]);
				//重置；
				reset();
			}
		};
	}

	//比较方法；
	function compare(num1,num2){
		return num1-num2;
	}

	//重置；
	function reset(){
		//1.将原蛇身绘制为画布；
		for (var k = 0; k < snake_array.length; k++) {
			clear_cell(snake_array[k].x,snake_array[k].y);
		};
		//2.将原数组清空；
		snake_array=[];
		//3.将原食物绘制为画布；
		clear_cell(food.x,food.y);
		//4.将方向设为默认right;
		nextS="right";
		//5.重置Score/Speed;
		score=0;
		oscore.html(score);
		speed=200;
		//6.重新初始化；
		init();
	}

	//键盘事件；
	$(document).keydown(function(e){
		var key=e.which;
		//alert(e.keyCode); 
		if(key=="37"&&nextS!="right") nextS="left";
		else if(key=="38"&&nextS!="down") nextS="up";
		else if(key=="39"&&nextS!="left") nextS="right";
		else if(key=="40"&&nextS!="up") nextS="down";
	})

	//方向控制；
	$(".dirUp").on('click',function(){
		if(nextS!="down") nextS="up";
	})
	$(".dirRight").on('click',function(){
		if(nextS!="left") nextS="right";
	})
	$(".dirDown").on('click',function(){
		if(nextS!="up") nextS="down";
	})
	$(".dirLeft").on('click',function(){
		if(nextS!="right") nextS="left";
	})
	//加速处理；
	$(".speedUp").on('click',function(){
		if(speed>0){
			speed-=70;
		}else{
			alert("The Highest SPEED!")
		}
		if(typeof game_loop != "undefined") clearInterval(game_loop);
		game_loop = setInterval(paint_snake, speed);
	})

	//减速处理；
	$(".speedDown").on('click',function(){
		if(speed<500){
			speed+=70;
		}else{
			alert("The Lowest SPEED!")
		}
		if(typeof game_loop != "undefined") clearInterval(game_loop);
		game_loop = setInterval(paint_snake, speed);
	})

	//重置处理；
	$(".reset_span").on('click',function(){
		reset();
	})
	
//UI--前台展示处理：
	//绘制蛇身的单元格；
	function snake_cell(x,y){
		ctx.fillStyle='white';
		ctx.fillRect(x*cx,y*cy,cx-1,cy-1);
		//ctx.strokeStyle="#444";
		//ctx.strokeRect(x*cx,y*cy,cx,cy);
	}

	//绘制食物的单元格；
	function food_cell(x,y){
		ctx.fillStyle='yellow';
		ctx.fillRect(x*cx,y*cy,cx-1,cy-1);
	}

	//pop掉蛇尾后，将蛇尾单元格重新绘制成画布色；
	function clear_cell(x,y){
		ctx.fillStyle='#444';
		ctx.fillRect(x*cx,y*cy,cx-1,cy-1);
	}

</script>
</html>
